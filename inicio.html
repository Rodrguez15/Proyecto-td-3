<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vilamir Gym</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="encabezado">

    <img src="img/logo.png" alt="Logo vilamir Gym" class="logo">

    <h1>vilamir Gym</h1>

    <p>Sistema de gestión de usuarios</p>

</div>

<div class="contenedor">

    <div class="card">

        <h2>Iniciar Sesión</h2>

        <input type="email" id="loginEmail" placeholder="Correo electrónico">

        <input type="password" id="loginPassword" placeholder="Contraseña">

        <button onclick="iniciarSesion()">
            Entrar
        </button>

        <div id="mensajeLogin" class="mensaje"></div>

    </div>

    <div class="card">

        <h2>Registrarse</h2>

        <input type="text" id="nombre" placeholder="Nombre">

        <input type="text" id="apellido" placeholder="Apellido">

        <input type="email" id="registroEmail" placeholder="Correo electrónico">

        <input type="password" id="registroPassword" placeholder="Contraseña">

        <input type="password" id="confirmarPassword"
               placeholder="Confirmar contraseña">

        <button onclick="registrarUsuario()">
            Crear cuenta
        </button>

        <div id="mensajeRegistro" class="mensaje"></div>

    </div>

</div>

<script src="script.js"></script>
<script>


let usuario = JSON.parse(localStorage.getItem("usuarioActivo"));

if(!usuario){
   
}

function iniciarSesion(){

    window.location.href = "usuario.html";

}

</script>

</body>
</html>
